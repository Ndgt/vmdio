name: Build Wheels

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

jobs:
  build_wheels:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: ${{matrix.python-version}}

    - name: Install build dependencies
      run: python -m pip install build pybind11-stubgen

    - name: Configure
      run: cmake -S . -B ${{github.workspace}}/build -A x64 -T v143 -DBUILD_PYTHON_WRAPPER=ON

    - name: Build Python Wrapper and Wheel
      run: cmake --build ${{github.workspace}}/build --config Release

    - name: Test Wheels
      run: |
        $wheel = Get-ChildItem -Path ${{github.workspace}}/build/wheel/dist/pyvmdio-*.whl
        python -m pip install $wheel
        python -m pip install pytest
        pytest -s ${{github.workspace}}/tests/pytest --log-cli-level=DEBUG

    - name: Extract Project version
      id: extract_version
      run: |
        $Version=Get-Content -Path ${{github.workspace}}/VERSION.txt
        "version=$Version" >> $env:GITHUB_OUTPUT

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: pyvmdio-v${{steps.extract_version.outputs.version}}-cp${{matrix.python-version}}
        path: ${{github.workspace}}/build/wheel/dist/*.whl